name: Release Framework Artifact

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create release and upload framework artifact
        uses: softprops/action-gh-release@v2
        with:
          files: docs/securable_framework.md
